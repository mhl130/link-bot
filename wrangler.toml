name = "link-bot"
main = "src/index.js"
compatibility_date = "2026-07-19"

[vars]
TAOBAO_API_URL = "https://eco.taobao.com/router/rest"
JD_API_URL = "https://api.jd.com/routerjson"

# Do not put real secrets here.
# Use `wrangler secret put <NAME>` for:
# WECHAT_TOKEN
# TAOBAO_APP_KEY
# TAOBAO_APP_SECRET
# TAOBAO_ADZONE_ID
# TAOBAO_PID
# JD_APP_KEY
# JD_APP_SECRET
# JD_PID
# JD_SITE_ID
# JD_POSITION_ID
# JD_SCENE_ID
